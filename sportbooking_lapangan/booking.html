<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Lapangan - Sport Booking</title>

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
    
    <header>
        <h1>FORM BOOKING LAPANGAN</h1>

        <nav>
            <a href="index.php">Home</a>
            <a href="courts.html">Lapangan</a>
            <a href="booking.html">Booking</a>
            <a href="payment.html">Payment</a>
            <a href="report.php">Laporan</a>
            <a href="dashboard.html">Grafik Transaksi</a>
            <a href="about.html">About</a>
        </nav>
    </header>

    <h2>Data Booking</h2>

    <input type="text" id="searchBooking" placeholder="Cari ID / Nama / Email / Olahraga / Tanggal">

    <button type="button" id="resetSearch">Reset Search</button>

    <table id="bookingTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nama</th>
                <th>Email</th>
                <th>Olahraga</th>
                <th>Tanggal</th>
                <th>Jam</th>
                <th>Total</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <section class="booking-section">

        <form id="bookingForm" action="booking_data.php" method="POST">

            <h2>Booking Sekarang</h2>

            <!-- Nama -->
             <label>Nama Lengkap</label>
             <input type="text" name="nama" placeholder="Masukkan nama lengkap" required>
            
             <br><br>

            <!-- Email -->
             <label>Email</label>
             <input type="email" name="email" placeholder="Masukkan email" required>

             <br><br>

            <!-- Jenis olahraga -->
             <label>Jenis Olahraga</label>
             <select name="sport" id="sportSelect" required>
                <option value="">Pilih olahraga</option>
                <option value="padel" data-price="120000">Padel - Rp120.0000</option>
                <option value="futsal" data-price="150000">Futsal - Rp150.0000</option>
                <option value="badminton" data-price="50000">Badminton - Rp50.0000</option>
             </select>

             <br><br>
            
            <!-- Tanggal -->
             <label>Tanggal Booking</label>
             <input type="date" name="tanggal" required>

             <br><br>

            <!-- Jam mulai -->
             <label>Jam Mulai</label>
             <input type="time" name="jam_mulai" required>

             <br><br>

            <!-- Jam selesai -->
             <label>Jam Selesai</label>
             <input type="time" name="jam_selesai" required>

             <br><br>

            <!-- Durasi -->
             <label>Durasi (jam)</label>
             <input type="number" id="durasi" min="1" max="12" value="1" required>

             <br><br>
            
            <!-- Pilihan fasilitas -->
             <label>Fasilitas Tambahan</label>
            
             <div>
                <input type="checkbox" name="fasilitas" value="Raket"> Raket
                <input type="checkbox" name="fasilitas" value="Shuttlecock"> Shuttlecock
                <input type="checkbox" name="fasilitas" value="Sepatu"> Sepatu
             </div>

             <br><br>

            <!-- Catalan -->
             <label>Catatan</label>
             <textarea name="catatan" placeholder="Tambahkan catatan"></textarea>

             <br><br>

            <!-- Total Harga -->
             <label>Total Harga</label>
             <input type="text" id="totalHarga" name="total" readonly>

             <br><br>

            <!-- Button -->
             <button type="submit" name="submit">Konfirmasi Booking</button>

        </form>

    </section>

    <footer>
        <p>@ 2026 Sport Booking System</p>
    </footer>

    <script src="assets/js/script.js"></script>
    <script src="assets/js/booking.js"></script>
</body>
</html>
